plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'db/schema.rb'

Lint/SuppressedException:
  Exclude:
    - 'bin/console'
    - 'bin/eun'
    - 'bin/setup'
    - 'spec/**/*.rb'

Lint/EmptyBlock:
  Exclude:
    - 'spec/**/*.rb'

Lint/EmptyClass:
  Enabled: false

Metrics/CollectionLiteralLength:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - '**/*.rake'
    - 'spec/**/*.rb'
    - 'config/**/*.rb'
    - '*.gemspec'

Style/FrozenStringLiteralComment:
  Enabled: false
Style/Encoding:
  Enabled: true
Style/NumericLiterals:
  Enabled: false
Style/RescueModifier:
  Enabled: false
Style/Documentation:
  Enabled: false
Style/GuardClause:
  Description: Check for conditionals that can be replaced with guard clauses
  StyleGuide: https://github.com/bbatsov/ruby-style-guide#no-nested-conditionals
  Enabled: true
  MinBodyLength: 1

Layout/LineLength:
  Max: 120
Metrics/AbcSize:
  Max: 999
Metrics/ClassLength:
  Max: 999
Metrics/CyclomaticComplexity:
  Max: 99
Metrics/MethodLength:
  Max: 999
Metrics/ModuleLength:
  Max: 999
Metrics/ParameterLists:
  Max: 10
Metrics/PerceivedComplexity:
  Max: 99

# RSpec cops - relax opinionated rules for existing test suite
RSpec/NestedGroups:
  Max: 6

RSpec/ContextWording:
  Enabled: false

RSpec/MessageSpies:
  Enabled: false

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/ExampleLength:
  Max: 15

RSpec/AnyInstance:
  Enabled: false

RSpec/MultipleExpectations:
  Max: 5

RSpec/MultipleMemoizedHelpers:
  Enabled: false

RSpec/InstanceVariable:
  Enabled: false
